// ── GOOGLE SHEETS ─────────────────────────────────────────────────────────────
// Sheet layout: Row 1 = headers (Name, Mon-0, Mon-1, ..., Sun-11)
// Each user has one row identified by their name in col A

function getWeekKey() {
  // Returns current week's Monday as YYYY-MM-DD
  const today = new Date();
  const day = today.getDay();
  const diffToMon = (day === 0 ? -6 : 1 - day);
  const monday = new Date(today);
  monday.setDate(today.getDate() + diffToMon);
  const y = monday.getFullYear();
  const m = String(monday.getMonth() + 1).padStart(2, '0');
  const d = String(monday.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function offsetWeek(baseWeek, offsetDays) {
  const d = new Date(baseWeek + 'T12:00:00');
  d.setDate(d.getDate() + offsetDays);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

async function changeWeek(dir) {
  await flushPendingSave();
  activeWeek = offsetWeek(activeWeek, dir * 7);
  lsSet('rs_active_week', activeWeek);
  loadWeekFromCache();
  buildGrid();
  renderGrid();
  updateWeekNav();
  updateAvatars();
}

function updateWeekNav() {
  const monday = new Date(activeWeek + 'T12:00:00');
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  const fmt = d => d.getDate() + ' ' + d.toLocaleString('en', {month: 'short'});
  const isThisWeek = activeWeek === getWeekKey();
  const label = document.getElementById('week-nav-label');
  label.innerHTML = `${fmt(monday)} – ${fmt(sunday)}${isThisWeek ? '<span class="current-badge">this week</span>' : ''}`;
  // Sync hidden date input
  const picker = document.getElementById('week-picker');
  if (picker) picker.value = activeWeek;
  // Today button always visible. Active state when focus is on AND we're on this week.
  const todayBtn = document.getElementById('week-today-btn');
  todayBtn.classList.remove('hidden');
  todayBtn.classList.toggle('active', focusToday && isThisWeek);
}

function openWeekPicker() {
  const picker = document.getElementById('week-picker');
  if (picker.showPicker) picker.showPicker();
  else picker.click();
}

async function goToToday() {
  await flushPendingSave();
  const wasThisWeek = activeWeek === getWeekKey();
  activeWeek = getWeekKey();
  lsSet('rs_active_week', activeWeek);
  // If already on this week, toggle focus. Otherwise navigate in and turn focus ON.
  focusToday = wasThisWeek ? !focusToday : true;
  lsSet('rs_focus_today', String(focusToday));
  loadWeekFromCache();
  buildGrid();
  renderGrid();
  updateWeekNav();
  updateAvatars();
}

async function jumpToWeek(dateStr) {
  if (!dateStr) return;
  await flushPendingSave();
  // Snap to the Monday of whatever week the picked date falls in
  const d = new Date(dateStr + 'T12:00:00');
  const day = d.getDay();
  const diffToMon = (day === 0 ? -6 : 1 - day);
  d.setDate(d.getDate() + diffToMon);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  activeWeek = `${y}-${m}-${dd}`;
  lsSet('rs_active_week', activeWeek);
  loadWeekFromCache();
  buildGrid();
  renderGrid();
  updateWeekNav();
  updateAvatars();
}

function normalizeWeek(v) {
  if (!v) return '';
  const s = String(v).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // Sheets sometimes returns Date-formatted cells as ISO strings — normalize
  const d = new Date(s);
  if (!isNaN(d.getTime())) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${dd}`;
  }
  return s;
}

function loadWeekFromCache() {
  // Load from cached sheet data for the active week
  NAMES.forEach(name => {
    const row = allSheetData.find(r =>
      String(r[0]).trim() === name && normalizeWeek(r[1]) === activeWeek
    );
    teamData[name] = {};
    if (row) {
      let colIdx = 2;
      for (let d = 0; d < 7; d++) {
        for (let s = 0; s < SLOTS_PER_DAY; s++) {
          teamData[name][slotKey(d, s)] = String(row[colIdx] || '0').trim() === '1';
          colIdx++;
        }
      }
    }
  });
  myData = { ...(teamData[currentUser] || {}) };
}

function buildHeaders() {
  const headers = ['Name', 'week'];
  for (let d = 0; d < 7; d++) {
    for (let s = 0; s < SLOTS_PER_DAY; s++) {
      headers.push(slotKey(d, s));
    }
  }
  return headers;
}

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxk3_36pxB1XRvymDVlaXfrlBkXFBu1qSAKjltJDVFIraDQ59JKpvmhFz82WPivBTqs/exec';
const TOTAL_COLS = 2 + 7 * SLOTS_PER_DAY; // 198

async function loadAllData() {
  setStatus('<span class="spinner"></span>Loading...');
  try {
    const res = await fetch(SCRIPT_URL);
    const rows = await res.json();
    // Strip header row if present (first row has "Name" or non-name string in col 0)
    allSheetData = rows.filter(r => NAMES.includes(String(r[0]).trim()));
    lastFetchAt = Date.now();
    // Now slice to active week
    loadWeekFromCache();
    renderGrid();
    updateAvatars();
    updateWeekNav();
    setStatus('<span class="live-dot"></span> live');
    startPoll();
  } catch (e) {
    setStatus('');
    showToast('Could not load: ' + e.message, true);
  }
}

// Background poll: fetch fresh data every 20s, preserve current user's unsaved edits
function startPoll() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(() => {
    if (document.visibilityState === 'visible' && !isDragging) pollData();
  }, 20000);
  // Also refresh whenever the tab regains focus
  if (!startPoll._listenerAttached) {
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && !isDragging) pollData();
    });
    window.addEventListener('focus', () => {
      if (!isDragging) pollData();
    });
    startPoll._listenerAttached = true;
  }
}

async function pollData() {
  try {
    const res = await fetch(SCRIPT_URL);
    const rows = await res.json();
    allSheetData = rows.filter(r => NAMES.includes(String(r[0]).trim()));
    lastFetchAt = Date.now();

    const dirty = isDirty();
    NAMES.forEach(name => {
      // Don't clobber my unsaved edits
      if (name === currentUser && dirty) return;
      const row = allSheetData.find(r =>
        String(r[0]).trim() === name && normalizeWeek(r[1]) === activeWeek
      );
      teamData[name] = {};
      if (row) {
        let colIdx = 2;
        for (let d = 0; d < 7; d++) {
          for (let s = 0; s < SLOTS_PER_DAY; s++) {
            teamData[name][slotKey(d, s)] = String(row[colIdx] || '0').trim() === '1';
            colIdx++;
          }
        }
      }
    });
    // If not dirty, sync myData with the fresh team data for currentUser
    if (!dirty && currentUser) {
      myData = { ...(teamData[currentUser] || {}) };
    }

    // Re-render whichever view is active
    renderGrid();
    updateAvatars();
  } catch (e) {
    // Silent — keep last good data
  }
}

async function initSheet() {
  const headers = buildHeaders();
  const row0 = headers;
  const dataRows = NAMES.map(n => {
    const r = new Array(headers.length).fill('0');
    r[0] = n;
    r[1] = getWeekKey();
    return r;
  });
  // Write header + all user rows via POST
  for (const r of [row0, ...dataRows]) {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ name: r[0], row: r })
    });
  }
  NAMES.forEach(n => { teamData[n] = {}; });
  myData = {};
  renderGrid();
  updateAvatars();
  setStatus('<span class="live-dot"></span> live');
}

async function saveAvailability() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Saving';
  try {
    const row = [currentUser, activeWeek];
    for (let d = 0; d < 7; d++) {
      for (let s = 0; s < SLOTS_PER_DAY; s++) {
        row.push(myData[slotKey(d, s)] ? '1' : '0');
      }
    }
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ name: currentUser, row })
    });
    const json = await res.json();
    if (!json.ok) throw new Error('Script error');
    teamData[currentUser] = { ...myData };
    // Update or insert in local cache so week navigation stays consistent
    const idx = allSheetData.findIndex(r =>
      String(r[0]).trim() === currentUser && normalizeWeek(r[1]) === activeWeek
    );
    if (idx >= 0) allSheetData[idx] = row;
    else allSheetData.push(row);
    btn.classList.remove('dirty');
    btn.innerHTML = '✓ Saved';
    lastSavedAt = Date.now();
    updateAvatars();
    updateTabTitle();
    setStatus('<span class="live-dot"></span> live');
    setTimeout(() => { if (!isDirty()) btn.textContent = 'Save'; }, 1400);
  } catch (e) {
    showToast('Save failed: ' + e.message, true);
    btn.textContent = 'Save';
  } finally {
    btn.disabled = false;
  }
}

// ── UI HELPERS ────────────────────────────────────────────────────────────────
function totalSlots() { return 7 * SLOTS_PER_DAY; }

function countFreeFor(name) {
  const data = (name === currentUser) ? myData : (teamData[name] || {});
  let n = 0;
  for (const k in data) if (data[k]) n++;
  return n;
}

function updateAvatars() {
  const el = document.getElementById('team-avatars');
  const total = totalSlots();
  el.innerHTML = NAMES.map(n => {
    const count = countFreeFor(n);
    const hasData = count > 0;
    const pct = Math.round((count / total) * 100);
    const isMe = n === currentUser;
    const isFiltered = teamFilter === n;
    return `<div class="avatar ${hasData ? 'loaded' : ''} ${isMe ? 'is-me' : ''} ${isFiltered ? 'is-filtered' : ''}" style="--acolor:${COLORS[n]}" onclick="toggleAvatarFilter('${n}')" title="Click to ${isFiltered ? 'clear filter' : 'show only ' + n + ' in Team View'}">
      <div class="avatar-row">
        <div class="avatar-pip"></div>
        <span class="avatar-name">${n}</span>
        <span class="avatar-count">${count}</span>
      </div>
      <div class="avatar-bar"><div class="avatar-bar-fill" style="--fill:${pct}%"></div></div>
    </div>`;
  }).join('');
  updateHeaderMeta();
  refreshCopyLastBtn();
}

function relativeTimeShort(ms) {
  if (!ms) return '';
  const sec = Math.max(0, Math.floor((Date.now() - ms) / 1000));
  if (sec < 5) return 'just now';
  if (sec < 60) return sec + 's ago';
  const min = Math.floor(sec / 60);
  if (min < 60) return min + 'm ago';
  const hr = Math.floor(min / 60);
  return hr + 'h ago';
}

function updateHeaderMeta() {
  const metaWeek = document.getElementById('meta-week');
  const metaSaved = document.getElementById('meta-saved');
  if (!metaWeek || !metaSaved) return;
  const monday = new Date(activeWeek + 'T12:00:00');
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  const fmt = d => d.getDate() + ' ' + d.toLocaleString('en', {month: 'short'});
  metaWeek.textContent = `Week of ${fmt(monday)}`;
  const savedCount = NAMES.filter(n => countFreeFor(n) > 0).length;
  const synced = lastFetchAt ? ` · synced ${relativeTimeShort(lastFetchAt)}` : '';
  metaSaved.textContent = `${savedCount}/5 saved${synced}`;
  metaSaved.className = savedCount === 5 ? 'meta-strong' : '';
}

// Refresh the "synced Xs ago" label every 10s so it stays fresh
setInterval(updateHeaderMeta, 10000);

function setStatus(html) {
  const el = document.getElementById('save-status');
  if (el) el.innerHTML = html;
}

let toastTimer;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = isError ? 'error show' : 'success show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = '', 2500);
}

// ── ADMIN ────────────────────────────────────────────────────────────────────
const ADMIN_PASSWORD = 'RADICAL!';

function openAdmin() {
  const overlay = document.getElementById('admin-overlay');
  overlay.style.display = 'flex';
  requestAnimationFrame(() => overlay.classList.add('visible'));
  document.getElementById('admin-pw').value = '';
  document.getElementById('admin-error').textContent = '';
  document.getElementById('admin-controls').style.display = 'none';
  document.getElementById('admin-auth-btn').style.display = '';
  document.getElementById('admin-success').style.display = 'none';
  setTimeout(() => document.getElementById('admin-pw').focus(), 100);
}

function closeAdmin() {
  const overlay = document.getElementById('admin-overlay');
  overlay.classList.remove('visible');
  setTimeout(() => overlay.style.display = 'none', 200);
}

function adminAuth() {
  const pw = document.getElementById('admin-pw').value;
  if (pw !== ADMIN_PASSWORD) {
    document.getElementById('admin-error').textContent = 'Wrong password.';
    return;
  }
  document.getElementById('admin-error').textContent = '';
  document.getElementById('admin-controls').style.display = 'block';
  document.getElementById('admin-auth-btn').style.display = 'none';
}

async function writeAllRows(weekKey) {
  // Write blank rows for all 5 people for a given week
  const rows = NAMES.map(name => [name, weekKey, ...Array(TOTAL_COLS - 2).fill('0')]);
  const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ rows, weekKey }) });
  const json = await res.json();
  if (!json.ok) throw new Error('Bulk reset failed');
}

async function adminReset() {
  if (!confirm('Reset ALL availability data for everyone?')) return;
  setAdminLoading(true, 'Resetting...');
  try {
    await writeAllRows(activeWeek);
    // Update cache — remove rows for this week, re-add blank ones
    allSheetData = allSheetData.filter(r => String(r[1]).trim() !== activeWeek);
    NAMES.forEach(n => {
      teamData[n] = {};
      allSheetData.push([n, activeWeek, ...Array(TOTAL_COLS - 2).fill('0')]);
    });
    myData = {};
    renderGrid();
    updateAvatars();
    setAdminSuccess('All clear! Everyone reset.');
    setTimeout(closeAdmin, 1800);
  } catch(e) {
    setAdminLoading(false);
    document.getElementById('admin-error').textContent = 'Failed: ' + e.message;
  }
}

function setAdminLoading(on, msg) {
  const btns = document.querySelectorAll('.admin-action-btn, .admin-cancel-btn, #admin-auth-btn');
  btns.forEach(b => b.disabled = on);
  if (on) document.getElementById('admin-error').textContent = msg || '';
}

function setAdminSuccess(msg) {
  document.getElementById('admin-controls').style.display = 'none';
  document.getElementById('admin-success').style.display = 'block';
  document.getElementById('admin-success').textContent = msg;
  setAdminLoading(false);
}

// Close on overlay click
document.getElementById('admin-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeAdmin();
});
document.getElementById('admin-pw').addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeAdmin();
});

// Enter key on password field
document.getElementById('admin-pw').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') adminAuth();
});

// ── PASSCODE: Enter key submits ──────────────────────────────────────────────
document.getElementById('passcode-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') unlockSite();
});

// ── KEYBOARD SHORTCUTS ───────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  // Skip when typing in an input
  const tag = e.target.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  // Skip if main view isn't visible (passcode/picker showing)
  const mainView = document.getElementById('main-view');
  if (!mainView || mainView.style.display === 'none') return;
  // Skip if admin modal is open
  if (document.getElementById('admin-overlay').classList.contains('visible')) return;

  if ((e.metaKey || e.ctrlKey) && (e.key === 's' || e.key === 'S')) {
    e.preventDefault();
    flushPendingSave();
    if (isDirty()) saveAvailability();
    return;
  }
  if (e.metaKey || e.ctrlKey || e.altKey) return; // ignore other modified keys

  if (e.key === 'ArrowLeft')  { e.preventDefault(); changeWeek(-1); }
  else if (e.key === 'ArrowRight') { e.preventDefault(); changeWeek(1); }
  else if (e.key === 't' || e.key === 'T') { e.preventDefault(); goToToday(); }
  else if (e.key === '1') { e.preventDefault(); switchTab('mine'); }
  else if (e.key === '2') { e.preventDefault(); switchTab('team'); }
});

// ── GLOBAL DRAG-END LISTENERS (once only) ────────────────────────────────────
// Only call markDirty if we were actually drag-painting — not on every tap.
// Calling markDirty on every touchend destroys/recreates avatar DOM nodes
// before the browser fires click, swallowing taps on dynamically-built elements.
document.addEventListener('mouseup',  () => { const was = isDragging; isDragging = false; if (was) markDirty(); });
document.addEventListener('touchend', () => { const was = isDragging; isDragging = false; if (was) markDirty(); });

// ── START ────────────────────────────────────────────────────────────────────
init();
</script>
